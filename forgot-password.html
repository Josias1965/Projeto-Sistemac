<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemac - Redefinir Senha</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="logo.png" type="image/png">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .auth-card {
            background-color: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .auth-logo {
            width: 80px;
            margin-bottom: 20px;
        }
        h1 {
            color: #1e293b;
            font-size: 1.5rem;
            margin-bottom: 8px;
        }
        .auth-subtitle {
            color: #64748b;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }
        .auth-form {
            text-align: left;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #475569;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: 0.3s;
            box-sizing: border-box;
        }
        .form-group input:focus {
            border-color: #00a884;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 168, 132, 0.1);
        }
        .btn-primary {
            width: 100%;
            background-color: #00a884;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-primary:hover {
            background-color: #008f72;
        }
        .btn-primary:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }
        .auth-footer {
            margin-top: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .btn-back {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            color: #64748b;
            font-size: 0.95rem;
            font-weight: 500;
            transition: 0.3s;
            margin-top: 20px;
        }
        .btn-back:hover {
            color: #00a884;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <img src="logo.png" alt="Sistemac" class="auth-logo">
        <h1>Redefinir Senha</h1>
        <p class="auth-subtitle">Confirme seus dados para criar uma nova senha</p>

        <form class="auth-form" id="reset-form">
            <div class="form-group">
                <label for="email">Email Cadastrado</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            <div class="form-group">
                <label for="documento">CPF ou CNPJ</label>
                <input type="text" id="documento" placeholder="000.000.000-00" required>
            </div>
            <div class="form-group">
                <label for="new-password">Nova Senha</label>
                <input type="password" id="new-password" placeholder="Mínimo 6 caracteres" minlength="6" required>
            </div>
            <div class="form-group">
                <label for="confirm-password">Confirmar Nova Senha</label>
                <input type="password" id="confirm-password" placeholder="Repita a nova senha" required>
            </div>

            <button type="submit" class="btn btn-primary" id="submit-btn" style="margin-top: 10px;">Redefinir Senha</button>

            <a href="login.html" class="btn-back">
                <i data-lucide="arrow-left" style="width: 18px;"></i>
                Voltar para Login
            </a>
        </form>
    </div>

    <script src="main.js"></script>
    <script>
        lucide.createIcons();

        const CONVEX_URL = 'https://next-greyhound-619.convex.cloud';
        const form = document.getElementById('reset-form');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const documento = document.getElementById('documento').value.trim();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword !== confirmPassword) {
                alert('As senhas não conferem!');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = 'Processando...';

            try {
                const response = await fetch(`${CONVEX_URL}/api/mutation`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        path: 'auth:resetPassword', // We will create this
                        args: { email, documento, newPassword },
                        format: 'json'
                    })
                });

                const result = await response.json();

                if (result.status === 'error' || result.errorMessage) {
                    alert('Erro ao redefinir: ' + (result.errorMessage || 'Dados incorretos ou usuário não encontrado.'));
                } else {
                    alert('Senha redefinida com sucesso!\nAgora você já pode fazer login com sua nova senha.');
                    window.location.href = 'login.html';
                }
            } catch (err) {
                console.error('Erro ao conectar com o servidor:', err);
                alert('Erro ao conectar com o servidor. Tente novamente.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Redefinir Senha';
            }
        });
    </script>
</body>
</html>
