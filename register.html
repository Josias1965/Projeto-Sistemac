<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemac | Cadastro de Cliente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #f0f7f4;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .register-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 700px;
            text-align: center;
        }
        .register-logo {
            width: 100px;
            margin: 0 auto 20px;
        }
        .register-card h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #0d2137;
        }
        .register-subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1rem;
        }
        .register-form {
            text-align: left;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 15px;
        }
        .form-row.full {
            grid-template-columns: 1fr;
        }
        .form-row.triple {
            grid-template-columns: 1fr 1fr 1fr;
        }
        .form-row.custom {
            grid-template-columns: 3fr 1fr;
        }
        .form-group label {
            font-size: 0.9rem;
            font-weight: 500;
            color: #444;
            margin-bottom: 8px;
            display: block;
        }
        .form-group input, .form-group select {
            background: #fdfdfd;
            border: 1px solid #e0e0e0;
            padding: 12px 16px;
            font-size: 0.95rem;
            width: 100%;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #00a884;
            box-shadow: 0 0 0 3px rgba(0, 168, 132, 0.1);
        }
        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 25px 0 15px;
            color: #0d2137;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .register-actions {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-back-login {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #555;
            font-weight: 500;
            font-size: 0.95rem;
        }
        .btn-back-login:hover {
            color: #00a884;
        }
        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr !important;
            }
        }
    </style>
</head>
<body>
    <div class="register-card">
        <img src="logo.png" alt="Sistemac" class="register-logo">
        <h1>Formulário de Cadastro de Cliente</h1>
        <p class="register-subtitle">Preencha seus dados para criar sua conta</p>

        <form class="register-form" id="registration-form">
            <div class="form-row full">
                <div class="form-group">
                    <label for="naturezaJuridica">Natureza Jurídica</label>
                    <select id="naturezaJuridica" name="naturezaJuridica">
                        <option value="Pessoa Física">Pessoa Física</option>
                        <option value="Pessoa Jurídica">Pessoa Jurídica</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="nomeCompleto">Nome Completo</label>
                    <input type="text" id="nomeCompleto" name="nomeCompleto" placeholder="Nome Completo" required>
                </div>
                <div class="form-group">
                    <label id="label-documento" for="documento">CPF</label>
                    <input type="text" id="documento" name="documento" placeholder="000.000.000-00" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="cep">CEP</label>
                    <input type="text" id="cep" name="cep" placeholder="00000-000" required>
                </div>
                <div class="form-group">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="(00) 90000-0000" required>
                </div>
            </div>

            <div class="form-row custom">
                <div class="form-group">
                    <label for="endereco">Endereço</label>
                    <input type="text" id="endereco" name="endereco" placeholder="Rua, Avenida, etc." required>
                </div>
                <div class="form-group">
                    <label for="numero">Número</label>
                    <input type="text" id="numero" name="numero" placeholder="Nº" required>
                </div>
            </div>

            <div class="form-row triple">
                <div class="form-group">
                    <label for="bairro">Bairro</label>
                    <input type="text" id="bairro" name="bairro" placeholder="Bairro" required>
                </div>
                <div class="form-group">
                    <label for="cidade">Cidade</label>
                    <input type="text" id="cidade" name="cidade" placeholder="Cidade" required>
                </div>
                <div class="form-group">
                    <label for="estado">Estado</label>
                    <input type="text" id="estado" name="estado" placeholder="Estado" required>
                </div>
            </div>

            <h2 class="section-title">Dados de Acesso</h2>
            <div class="form-row">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" minlength="6" required>
                </div>
            </div>

            <div class="register-actions">
                <a href="login.html" class="btn-back-login">
                    <i data-lucide="arrow-left" style="width: 18px;"></i>
                    Voltar para Login
                </a>
                <button type="submit" class="btn btn-primary" style="padding: 12px 40px; border-radius: 12px;">Cadastrar</button>
            </div>
        </form>
    </div>

    <script src="main.js"></script>
    <script>
        lucide.createIcons();

        // Handle field label change for CPF/CNPJ
        const naturezaSelect = document.getElementById('naturezaJuridica');
        const docLabel = document.getElementById('label-documento');
        const docInput = document.getElementById('documento');

        naturezaSelect.addEventListener('change', (e) => {
            if (e.target.value === 'Pessoa Jurídica') {
                docLabel.innerText = 'CNPJ';
                docInput.placeholder = '00.000.000/0000-00';
            } else {
                docLabel.innerText = 'CPF';
                docInput.placeholder = '000.000.000-00';
            }
        });

        // Form Submission
        const form = document.getElementById('registration-form');
        const submitBtn = form.querySelector('button[type="submit"]');
        const CONVEX_URL = 'https://next-greyhound-619.convex.cloud';

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            submitBtn.disabled = true;
            submitBtn.innerText = 'Cadastrando...';

            try {
                const response = await fetch(`${CONVEX_URL}/api/mutation`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        path: 'auth:register',
                        args: {
                            naturezaJuridica: data.naturezaJuridica,
                            nomeCompleto: data.nomeCompleto,
                            documento: data.documento,
                            cep: data.cep,
                            telefone: data.telefone,
                            endereco: data.endereco,
                            numero: data.numero,
                            bairro: data.bairro,
                            cidade: data.cidade,
                            estado: data.estado,
                            email: data.email,
                            password: data.password
                        },
                        format: 'json'
                    })
                });

                const result = await response.json();

                if (result.status === 'error' || result.errorMessage) {
                    const msg = result.errorMessage || 'Erro ao cadastrar.';
                    if (msg.includes('já cadastrado')) {
                        alert('Este email já está cadastrado. Faça login ou use outro email.');
                    } else {
                        alert('Erro ao cadastrar: ' + msg);
                    }
                } else {
                    alert('Cadastro realizado com sucesso!\nSeja bem-vindo(a)!');
                    window.location.href = 'login.html';
                }
            } catch (err) {
                console.error('Erro ao conectar com o servidor:', err);
                alert('Erro ao conectar com o servidor. Tente novamente.');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Cadastrar';
            }
        });


        // CEP auto-fill simulator (Auto-preenchimento)
        document.getElementById('cep').addEventListener('blur', function() {
            if (this.value.length >= 8) {
                // Em uma aplicação real, aqui chamaria uma API de CEP (ViaCEP)
                console.log('CEP detectado, carregando endereços...');
            }
        });
    </script>
</body>
</html>
