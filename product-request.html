<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistemac | Requisição de Produtos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #f0f7f4;
            min-height: 100vh;
            padding: 20px;
        }
        .request-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
        }
        .header-section {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 30px;
        }
        .logo-top {
            width: 100px;
            display: block;
            margin: 0 auto 10px;
        }
        .title-container {
            text-align: center;
            width: 100%;
            padding: 0 100px;
        }
        .title-container h1 {
            font-size: 1.6rem;
            color: #0d2137;
            text-transform: uppercase;
        }
        .req-number-badge {
            background: #00a884;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.7rem;
            font-weight: 700;
            position: absolute;
            right: 0;
            top: -15px;
        }
        .req-number-badge span {
            font-size: 1rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .form-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #666;
            margin-bottom: 5px;
            display: block;
        }
        .form-group input {
            background: #f8fbf9;
            border: 1px solid #e2ece6;
            padding: 10px 15px;
            font-size: 0.95rem;
            width: 100%;
            border-radius: 8px;
            outline: none;
            color: #333;
        }
        .form-group input:read-only {
            background: #f1f5f2;
            color: #777;
        }

        /* Table styles */
        .req-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        .req-table th {
            text-align: left;
            padding: 12px;
            background: #f8fbf9;
            color: #444;
            font-size: 0.85rem;
            font-weight: 600;
            border-bottom: 1px solid #eee;
        }
        .req-table td {
            padding: 8px 5px;
            border-bottom: 1px solid #f9f9f9;
        }
        .input-qty {
            width: 80px;
            padding: 8px;
            border: 1px solid #e2ece6;
            border-radius: 6px;
            text-align: center;
        }
        .input-desc {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #e2ece6;
            border-radius: 6px;
        }
        .input-price {
            width: 130px;
            padding: 8px;
            border: 1px solid #f0f4f2;
            background: #fcfdfe;
            color: #99a;
            font-size: 0.85rem;
            border-radius: 6px;
            text-align: center;
        }

        .info-box {
            background: #fff9e6;
            border: 1px solid #ffeeba;
            padding: 15px 20px;
            border-radius: 10px;
            margin: 20px 0;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            max-width: 600px;
            margin-left: auto;
        }
        .info-box i {
            color: #f39c12;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .info-box-text h4 {
            color: #856404;
            font-size: 0.9rem;
            margin-bottom: 3px;
        }
        .info-box-text p {
            color: #b58105;
            font-size: 0.75rem;
            line-height: 1.4;
        }

        .footer-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
        }
        .btn-back {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .btn-back:hover {
            color: #00a884;
        }

        @media (max-width: 768px) {
            .req-table {
                display: block;
                overflow-x: auto;
            }
            .header-section {
                flex-direction: column;
                gap: 20px;
            }
            .title-container {
                padding: 0 10px;
            }
            .req-number-badge {
                position: static;
                transform: none;
                margin-top: 10px;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="request-card">
        <img src="logo.png" alt="Sistemac" class="logo-top">
        
        <div class="header-section">
            <div class="title-container">
                <h1>Requisição de Produtos</h1>
            </div>
            <div class="req-number-badge">
                Nº da Requisição
                <span id="req-number">RP-0001</span>
            </div>
        </div>

        <form id="product-req-form">
            <div class="form-row">
                <div class="form-group">
                    <label>Nome da Empresa</label>
                    <input type="text" id="companyName" value="André Cavalcante" readonly>
                </div>
                <div class="form-group">
                    <label>Data</label>
                    <input type="text" id="currentDate" value="13/03/2026" readonly>
                </div>
            </div>

            <table class="req-table">
                <thead>
                    <tr>
                        <th style="width: 100px;">Quantidade</th>
                        <th>Descrição do Produto</th>
                        <th style="width: 150px;">Vlr_Unit</th>
                        <th style="width: 150px;">Valor Total</th>
                    </tr>
                </thead>
                <tbody id="items-body">
                    <!-- 9 lines by default as in screenshot -->
                    <tr>
                        <td><input type="number" class="input-qty" value="0" min="0"></td>
                        <td><input type="text" class="input-desc" placeholder="Descrição do produto"></td>
                        <td><input type="text" class="input-price" value="venda" readonly></td>
                        <td><input type="text" class="input-price" value="venda" readonly></td>
                    </tr>
                    <tr>
                        <td><input type="number" class="input-qty" value="0" min="0"></td>
                        <td><input type="text" class="input-desc" placeholder="Descrição do produto"></td>
                        <td><input type="text" class="input-price" value="venda" readonly></td>
                        <td><input type="text" class="input-price" value="venda" readonly></td>
                    </tr>
                    <tr>
                        <td><input type="number" class="input-qty" value="0" min="0"></td>
                        <td><input type="text" class="input-desc" placeholder="Descrição do produto"></td>
                        <td><input type="text" class="input-price" value="venda" readonly></td>
                        <td><input type="text" class="input-price" value="venda" readonly></td>
                    </tr>
                    <tr>
                        <td><input type="number" class="input-qty" value="0" min="0"></td>
                        <td><input type="text" class="input-desc" placeholder="Descrição do produto"></td>
                        <td><input type="text" class="input-price" value="venda" readonly></td>
                        <td><input type="text" class="input-price" value="venda" readonly></td>
                    </tr>
                    <tr>
                        <td><input type="number" class="input-qty" value="0" min="0"></td>
                        <td><input type="text" class="input-desc" placeholder="Descrição do produto"></td>
                        <td><input type="text" class="input-price" value="venda" readonly></td>
                        <td><input type="text" class="input-price" value="venda" readonly></td>
                    </tr>
                    <tr>
                        <td><input type="number" class="input-qty" value="0" min="0"></td>
                        <td><input type="text" class="input-desc" placeholder="Descrição do produto"></td>
                        <td><input type="text" class="input-price" value="venda" readonly></td>
                        <td><input type="text" class="input-price" value="venda" readonly></td>
                    </tr>
                    <tr>
                        <td><input type="number" class="input-qty" value="0" min="0"></td>
                        <td><input type="text" class="input-desc" placeholder="Descrição do produto"></td>
                        <td><input type="text" class="input-price" value="venda" readonly></td>
                        <td><input type="text" class="input-price" value="venda" readonly></td>
                    </tr>
                    <tr>
                        <td><input type="number" class="input-qty" value="0" min="0"></td>
                        <td><input type="text" class="input-desc" placeholder="Descrição do produto"></td>
                        <td><input type="text" class="input-price" value="venda" readonly></td>
                        <td><input type="text" class="input-price" value="venda" readonly></td>
                    </tr>
                    <tr>
                        <td><input type="number" class="input-qty" value="0" min="0"></td>
                        <td><input type="text" class="input-desc" placeholder="Descrição do produto"></td>
                        <td><input type="text" class="input-price" value="venda" readonly></td>
                        <td><input type="text" class="input-price" value="venda" readonly></td>
                    </tr>
                </tbody>
            </table>

            <div class="info-box">
                <i data-lucide="info" style="width: 20px;"></i>
                <div class="info-box-text">
                    <h4>Valores preenchidos pela venda</h4>
                    <p>Os campos de Valor Unitário e Valor Total serão preenchidos pelo administrador após o envio da requisição.</p>
                </div>
            </div>

            <div class="footer-actions">
                <a href="dashboard.html" class="btn-back">
                    <i data-lucide="arrow-left" style="width: 18px;"></i>
                    Voltar ao Painel
                </a>
                <button type="submit" class="btn btn-primary" style="padding: 12px 40px; border-radius: 8px;">Enviar Requisição</button>
            </div>
        </form>
    </div>

    <script src="main.js"></script>
    <script>
        lucide.createIcons();

        // Prefill Name and Date
        const savedName = localStorage.getItem('sistemac_user_name');
        if (savedName) {
            document.getElementById('companyName').value = savedName;
        }

        const today = new Date();
        const formattedDate = today.toLocaleDateString('pt-BR');
        document.getElementById('currentDate').value = formattedDate;

        // Session protection
        const session = localStorage.getItem('sistemac_user_session');
        if (!session) {
            window.location.href = 'login.html';
        }

        // Auto-Numbering logic
        let lastNum = parseInt(localStorage.getItem('sistemac_last_prod_req_num') || "0");
        const nextNum = lastNum + 1;
        const displayNum = `RP-${nextNum.toString().padStart(4, '0')}`;
        document.getElementById('req-number').innerText = displayNum;

        // Form Submission
        const form = document.getElementById('product-req-form');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Collect data
            const rows = document.querySelectorAll('#items-body tr');
            const items = [];
            rows.forEach(row => {
                const qty = parseInt(row.querySelector('.input-qty').value);
                const desc = row.querySelector('.input-desc').value.trim();
                if (qty > 0 && desc !== "") {
                    // Using 'qtd' and 'desc' keys to match admin-dashboard.html expectations
                    items.push({ qtd: qty, desc: desc, unit: 0 });
                }
            });

            if (items.length === 0) {
                alert("Por favor, adicione pelo menos um produto com quantidade maior que zero.");
                return;
            }

            // Save to localStorage for Admin Dashboard
            const requestData = {
                id: Date.now(),
                reqNum: displayNum,
                client: document.getElementById('companyName').value,
                date: document.getElementById('currentDate').value,
                items: items,
                status: 'Pendente'
            };

            let productRequests = JSON.parse(localStorage.getItem('sistemac_product_requests') || '[]');
            productRequests.push(requestData);
            localStorage.setItem('sistemac_product_requests', JSON.stringify(productRequests));

            // Increment number for next time
            localStorage.setItem('sistemac_last_prod_req_num', nextNum);
            
            alert(`Requisição de Produto ${displayNum} enviada com sucesso!\nNossos consultores preencherão os valores e entrarão em contato.`);
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
